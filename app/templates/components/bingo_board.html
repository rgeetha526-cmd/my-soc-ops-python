<div class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-2 text-center border border-gray-300 rounded-lg transition-all duration-200 select-none min-h-[60px] text-xs leading-tight shadow-sm hover:shadow-md
        {%- if square.is_marked %}
            {%- if is_winning %} bg-amber-200 border-amber-400 text-amber-900 shadow-md
            {%- else %} bg-marked border-marked-border text-blue-800 shadow-md
            {%- endif %}
        {%- else %} bg-white text-gray-700 hover:bg-gray-50 hover:border-gray-400 active:bg-gray-100
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-0.5 right-0.5 text-blue-600 text-xs">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
