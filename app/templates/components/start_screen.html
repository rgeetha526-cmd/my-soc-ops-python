<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-gradient-to-br from-blue-50 to-white">
    <div class="text-center max-w-md">
        <h1 class="text-5xl font-bold text-blue-900 mb-2">Soc Ops</h1>
        <p class="text-xl text-blue-700 mb-1">Social Bingo</p>
        <p class="text-sm text-gray-600 mb-8">Break the ice with fun conversations</p>

        <div class="bg-white rounded-xl p-8 shadow-lg border border-gray-200 mb-8">
            <h2 class="font-semibold text-gray-800 mb-4 text-lg">How to play</h2>
            <ul class="text-left text-gray-700 text-sm space-y-3">
                <li class="flex items-start"><span class="text-blue-600 mr-2">•</span> Find people who match the questions</li>
                <li class="flex items-start"><span class="text-blue-600 mr-2">•</span> Tap a square when you find a match</li>
                <li class="flex items-start"><span class="text-blue-600 mr-2">•</span> Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-white font-semibold py-4 px-8 rounded-lg text-lg hover:shadow-xl transition-all duration-200">
            Start Game
        </button>
    </div>
</div>
</div>
